<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博生平记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #333;
    }
    h1 { font-size: 2rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 2rem; }
    .input-wrap {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #333; }
    button {
      margin-top: 1.5rem;
      padding: 14px 40px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #444; }
    .sub { margin-top: 1rem; font-size: 0.85rem; color: #999; }
  </style>
</head>
<body>
  <h1>赛博生平记</h1>
  <div class="input-wrap">
    <input type="text" id="title" placeholder="给一生起个标题" maxlength="50">
    <button onclick="create()">创建我的生平</button>
    <p class="sub">扫码即看，无须注册</p>
  </div>

  <script>
    async function create() {
      const title = document.getElementById('title').value.trim();
      if (!title) return alert('请输入标题');

      try {
        const res = await fetch('http://127.0.0.1:3000/api/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        const result = await res.json();
        if (result.code === 200) {
          location.href = `edit.html?token=${result.token}`;
        }
      } catch (err) {
        alert('网络错误，请检查后端是否启动');
      }
    }

    document.getElementById('title').addEventListener('keydown', e => {
      if (e.key === 'Enter') create();
    });
  </script>
</body>
</html>
