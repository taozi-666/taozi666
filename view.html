<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生平 - 赛博生平记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.8;
      color: #222;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }
    #content {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 1.05rem;
      color: #444;
    }
    #media {
      margin-top: 32px;
    }
    #media img {
      max-width: 100%;
      border-radius: 8px;
      display: block;
    }
    .loading {
      color: #999;
      font-size: 0.9rem;
    }
    .footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 0.8rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1 id="title">生平</h1>
  <div id="content" class="loading">加载中...</div>
  <div id="media"></div>
  <div class="footer">赛博生平记</div>

  <script>
    const id = new URLSearchParams(location.search).get('id');
    if (!id) {
      document.getElementById('content').textContent = '链接无效';
    } else {
      fetch(`http://127.0.0.1:3000/api/get/${id}`)
        .then(r => r.json())
        .then(result => {
          if (result.code === 200) {
            document.getElementById('title').textContent = result.title;
            document.getElementById('content').textContent = result.content || '此人未留下任何文字';
            if (result.media) {
              document.getElementById('media').innerHTML = `<img src="${result.media}" alt="配图">`;
            }
          } else {
            document.getElementById('content').textContent = '未找到此生平';
          }
        })
        .catch(() => {
          document.getElementById('content').textContent = '加载失败，请稍后重试';
        });
    }
  </script>
</body>
</html>
